# =============================================================================
# GitHub Profile Analyzer - CI/CD Pipeline
# =============================================================================
#
# This workflow automates:
#   1. Code quality checks (linting with ruff)
#   2. Test execution (pytest with coverage)
#   3. Docker image build and push
#
# Deployment Options:
# -----------------------------------------------------------------------------
#
# Option 1: Railway (https://railway.app)
# ----------------------------------------
# Railway is a modern deployment platform that integrates seamlessly with GitHub.
#
# Setup:
#   1. Connect your GitHub repository to Railway
#   2. Railway auto-detects Dockerfile and builds the image
#   3. Set environment variables in Railway dashboard:
#      - GITHUB_TOKEN (optional, for higher rate limits)
#      - ZHIPUAI_API_KEY (required for AI insights)
#   4. Deploy!
#
# railway.toml example:
#   [build]
#   builder = "DOCKERFILE"
#   dockerfilePath = "Dockerfile"
#
#   [deploy]
#   startCommand = "streamlit run app/streamlit_app.py --server.port=$PORT --server.address=0.0.0.0"
#   healthcheckPath = "/_stcore/health"
#   healthcheckTimeout = 300
#   restartPolicyType = "ON_FAILURE"
#   restartPolicyMaxRetries = 10
#
# Option 2: Render (https://render.com)
# -------------------------------------
# Render offers free tier and simple Docker deployments.
#
# Setup:
#   1. Create a new Web Service in Render
#   2. Connect your GitHub repository
#   3. Set the following:
#      - Environment: Docker
#      - Dockerfile Path: ./Dockerfile
#      - Port: 8501
#   4. Add environment variables:
#      - GITHUB_TOKEN
#      - ZHIPUAI_API_KEY
#
# render.yaml example:
#   services:
#     - type: web
#       name: github-analyzer
#       env: docker
#       dockerfilePath: ./Dockerfile
#       plan: free  # or starter, standard, pro
#       healthCheckPath: /_stcore/health
#       envVars:
#         - key: GITHUB_TOKEN
#           sync: false
#         - key: ZHIPUAI_API_KEY
#           sync: false
#
# Option 3: Fly.io (https://fly.io)
# ----------------------------------
# Fly.io is great for global deployments with edge computing.
#
# Setup:
#   1. Install flyctl: curl -L https://fly.io/install.sh | sh
#   2. Login: fly auth login
#   3. Launch: fly launch
#   4. Set secrets: fly secrets set ZHIPUAI_API_KEY=your_key
#
# fly.toml example:
#   app = "github-analyzer"
#   primary_region = "sjc"
#
#   [build]
#   dockerfile = "Dockerfile"
#
#   [http_service]
#   internal_port = 8501
#   force_https = true
#   auto_stop_machines = true
#   auto_start_machines = true
#   min_machines_running = 0
#   processes = ["app"]
#
#   [[vm]]
#   cpu_kind = "shared"
#   cpus = 1
#   memory_mb = 1024
#
# Option 4: Google Cloud Run / AWS App Runner / Azure Container Apps
# ------------------------------------------------------------------
# All major cloud providers support container deployments:
#
# Google Cloud Run:
#   gcloud run deploy github-analyzer \
#     --source . \
#     --platform managed \
#     --region us-central1 \
#     --set-env-vars GITHUB_TOKEN=xxx,ZHIPUAI_API_KEY=xxx
#
# AWS App Runner:
#   Create service from ECR or GitHub, set port to 8501
#
# Azure Container Apps:
#   az containerapp create \
#     --name github-analyzer \
#     --resource-group myResourceGroup \
#     --image myregistry.azurecr.io/github-analyzer:latest \
#     --target-port 8501 \
#     --env-vars GITHUB_TOKEN=xxx ZHIPUAI_API_KEY=xxx
#
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'app/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Manual trigger support

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: github-analyzer

jobs:
  # ===========================================================================
  # Job 1: Code Quality (Linting)
  # ===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy

      - name: Run Ruff (linter)
        run: |
          ruff check src/ app/ tests/ --output-format=github
        continue-on-error: false

      - name: Run Black (formatter check)
        run: |
          black --check src/ app/ tests/
        continue-on-error: true

      - name: Run MyPy (type checker)
        run: |
          mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  # ===========================================================================
  # Job 2: Test Suite
  # ===========================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test environment
        run: |
          mkdir -p data
          echo "DB_PATH=./data/test.db" >> .env
          echo "GITHUB_TOKEN=" >> .env
          echo "ZHIPUAI_API_KEY=test_key" >> .env

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0 \
            -v
        env:
          PYTHONPATH: .
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY || 'test_key' }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # ===========================================================================
  # Job 3: Docker Build
  # ===========================================================================
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ===========================================================================
  # Job 4: Deploy Notification (Optional)
  # ===========================================================================
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: build
    if: success()
    
    steps:
      - name: Send deployment success notification
        run: |
          echo "✅ GitHub Profile Analyzer deployed successfully!"
          echo "📦 Image: ghcr.io/${{ github.repository }}:latest"
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"

      # Uncomment to enable Slack notification
      # - name: Notify Slack
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: success
      #     fields: repo,message,commit,author,action,eventName,ref,workflow
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
