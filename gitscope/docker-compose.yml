# =============================================================================
# GitHub Profile Analyzer - Docker Compose
# =============================================================================
#
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Environment:
#   Copy .env.example to .env and fill in your API keys
#
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-analyzer
    ports:
      - "8501:8501"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
      - DB_PATH=/app/data/github_analyzer.db
    volumes:
      # Persist database
      - ./data:/app/data
      # Mount source for development (remove in production)
      - ./src:/app/src:ro
      - ./app:/app/app:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

